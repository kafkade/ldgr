# XcodeGen project spec for the ldgr iOS app.
#
# Generate the Xcode project:
#   brew install xcodegen
#   cd apps/ios && xcodegen generate
#
# Then open ldgr.xcodeproj in Xcode.

name: ldgr
options:
  bundleIdPrefix: com.kafkade
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  LdgrSwift:
    path: ../../bindings/swift

targets:
  ldgr:
    type: application
    platform: iOS
    sources:
      - path: ldgr/Sources
      - path: ldgr/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kafkade.ldgr
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: ldgr/Info.plist
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: LdgrSwift
        product: LdgrSwift
    info:
      path: ldgr/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
