# XcodeGen project spec for the ldgr iOS + watchOS app.
#
# Generate the Xcode project:
#   brew install xcodegen
#   cd apps/ios && xcodegen generate
#
# Then open ldgr.xcodeproj in Xcode.

name: ldgr
options:
  bundleIdPrefix: com.kafkade
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  LdgrSwift:
    path: ../../bindings/swift

targets:
  ldgr:
    type: application
    platform: iOS
    sources:
      - path: ldgr/Sources
      - path: ldgr/Resources
      - path: LdgrShared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kafkade.ldgr
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: ldgr/Info.plist
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: ldgr/ldgr.entitlements
    dependencies:
      - package: LdgrSwift
        product: LdgrSwift
      - target: ldgrWatch
      - target: ldgrWidgets
    info:
      path: ldgr/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  ldgr-macos:
    type: application
    platform: macOS
    sources:
      - path: ldgr/Sources
        excludes:
          # Siri App Shortcuts are an iOS platform integration handled in a
          # separate issue; the macOS SDK also flags the AppIntents static
          # requirements under Swift 6 strict concurrency.
          - "Intents/**"
      - path: ldgr-macos/Resources
      - path: LdgrShared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kafkade.ldgr
        PRODUCT_NAME: ldgr
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: ldgr-macos/Info.plist
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LSApplicationCategoryType: public.app-category.finance
        CODE_SIGN_ENTITLEMENTS: ldgr-macos/ldgr-macos.entitlements
    dependencies:
      - package: LdgrSwift
        product: LdgrSwift

  ldgrWatch:
    type: application
    platform: watchOS
    sources:
      - path: ldgrWatch/Sources
      - path: ldgrWatch/Resources
      - path: LdgrShared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kafkade.ldgr.watchkitapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: ldgrWatch/Info.plist
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: ldgrWatch/ldgrWatch.entitlements
    dependencies:
      - target: ldgrWatchWidgets
    info:
      path: ldgrWatch/Info.plist
      properties:
        WKCompanionAppBundleIdentifier: com.kafkade.ldgr

  ldgrWatchWidgets:
    type: app-extension
    platform: watchOS
    sources:
      - path: ldgrWatch/Widgets
      - path: LdgrShared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kafkade.ldgr.watchkitapp.widgets
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: ldgrWatch/Widgets/Info.plist
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: ldgrWatch/Widgets/ldgrWatchWidgets.entitlements
    info:
      path: ldgrWatch/Widgets/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  ldgrWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: ldgrWidgets/Sources
      - path: ldgrWidgets/Resources
      - path: LdgrShared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kafkade.ldgr.widgets
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: ldgrWidgets/Info.plist
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: ldgrWidgets/ldgrWidgets.entitlements
    info:
      path: ldgrWidgets/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
