name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # ── Change detection ──────────────────────────────────────────────────────────
  # Determines which component groups were modified so downstream jobs can skip
  # irrelevant work on PRs. Push-to-main always runs everything.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      swift: ${{ steps.filter.outputs.swift }}
      docs: ${{ steps.filter.outputs.docs }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.*'
              - 'tests/**'
            swift:
              - 'apps/ios/**'
              - 'bindings/swift/**'
              - 'crates/ldgr-ffi/**'
            docs:
              - '**/*.md'
              - '.markdownlint-cli2.jsonc'
            web:
              - 'apps/web/**'
              - 'crates/ldgr-wasm/**'

  # ── Rust checks ───────────────────────────────────────────────────────────────

  test:
    name: Test
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  clippy:
    name: Clippy
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  fmt:
    name: Formatting
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  wasm:
    name: WASM build
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      # Verify ldgr-core itself stays WASM-compilable
      - name: Build ldgr-core for WASM
        run: cargo build -p ldgr-core --target wasm32-unknown-unknown --no-default-features --features core

      # Build the wasm-bindgen package with optimizations
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build ldgr-wasm (core)
        run: wasm-pack build crates/ldgr-wasm --target web --release -- --no-default-features --features core

      # Enforce 2 MB compressed budget (per ADR-005)
      - name: Check bundle size
        run: |
          WASM_FILE="crates/ldgr-wasm/pkg/ldgr_wasm_bg.wasm"
          RAW_SIZE=$(stat -c%s "$WASM_FILE")
          gzip -k "$WASM_FILE"
          GZ_SIZE=$(stat -c%s "${WASM_FILE}.gz")
          BUDGET=2097152  # 2 MB

          echo "Raw WASM size:        $(( RAW_SIZE / 1024 )) KB ($RAW_SIZE bytes)"
          echo "Compressed WASM size: $(( GZ_SIZE / 1024 )) KB ($GZ_SIZE bytes)"
          echo "Budget:               $(( BUDGET / 1024 )) KB ($BUDGET bytes)"

          if [ "$GZ_SIZE" -gt "$BUDGET" ]; then
            echo "::error::WASM bundle exceeds 2 MB compressed budget ($GZ_SIZE bytes > $BUDGET bytes)"
            exit 1
          fi
          echo "✅ Bundle is within budget"

  msrv:
    name: MSRV
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Single source of truth: derive the MSRV from the workspace rust-version
      # so the toolchain pin can never drift from Cargo.toml.
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          VERSION=$(grep -m1 '^rust-version' Cargo.toml | sed -E 's/.*"([0-9]+\.[0-9]+(\.[0-9]+)?)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse rust-version from Cargo.toml"
            exit 1
          fi
          echo "Resolved MSRV: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check --workspace --all-features

  audit:
    name: Security audit
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Swift / iOS ───────────────────────────────────────────────────────────────

  swift:
    name: Swift (iOS)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.swift == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - uses: Swatinem/rust-cache@v2
        with:
          key: swift-ios

      - name: Build XCFramework
        run: |
          cd bindings/swift
          chmod +x ./build-xcframework.sh
          ./build-xcframework.sh

  # ── Documentation ─────────────────────────────────────────────────────────────

  markdownlint:
    name: Markdown lint
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: npx markdownlint-cli2 "**/*.md"

  # ── Web ──────────────────────────────────────────────────────────────────────

  web:
    name: Web (Next.js)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        working-directory: apps/web
        run: npm ci
      - name: Copy sql.js WASM binary
        working-directory: apps/web
        run: |
          mkdir -p public/sql.js
          cp node_modules/sql.js/dist/sql-wasm.wasm public/sql.js/
      - name: Run tests
        working-directory: apps/web
        run: npm test

  # ── Summary gate ──────────────────────────────────────────────────────────────
  # Single required status check for branch protection. Downstream jobs may be
  # skipped (path filters) — that is OK; only failures or cancellations block.
  ci:
    name: CI
    if: always()
    needs: [changes, test, clippy, fmt, wasm, msrv, audit, swift, markdownlint, web]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependency failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: All checks passed
        run: echo "All CI checks passed"
