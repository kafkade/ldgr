name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # ── Change detection ──────────────────────────────────────────────────────────
  # Determines which component groups were modified so downstream jobs can skip
  # irrelevant work on PRs. Push-to-main always runs everything.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      swift: ${{ steps.filter.outputs.swift }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.*'
              - 'tests/**'
            swift:
              - 'apps/ios/**'
              - 'bindings/swift/**'
              - 'crates/ldgr-ffi/**'
            docs:
              - '**/*.md'
              - '.markdownlint-cli2.jsonc'

  # ── Rust checks ───────────────────────────────────────────────────────────────

  test:
    name: Test
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  clippy:
    name: Clippy
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  fmt:
    name: Formatting
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  wasm:
    name: WASM build
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p ldgr-core --target wasm32-unknown-unknown --no-default-features --features core

  msrv:
    name: MSRV (1.85)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check --workspace --all-features

  audit:
    name: Security audit
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Swift / iOS ───────────────────────────────────────────────────────────────

  swift:
    name: Swift (iOS)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.swift == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - uses: Swatinem/rust-cache@v2
        with:
          key: swift-ios

      - name: Install tools
        run: |
          cargo install uniffi-bindgen-cli --locked || true
          brew install xcodegen

      - name: Build XCFramework
        run: |
          cd bindings/swift
          chmod +x ./build-xcframework.sh
          ./build-xcframework.sh

      - name: Generate Xcode project
        run: |
          cd apps/ios
          xcodegen generate

      - name: Build iOS app (simulator)
        run: |
          cd apps/ios
          xcodebuild build \
            -project ldgr.xcodeproj \
            -scheme ldgr \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            -quiet

  # ── Documentation ─────────────────────────────────────────────────────────────

  markdownlint:
    name: Markdown lint
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: npx markdownlint-cli2 "**/*.md"

  # ── Summary gate ──────────────────────────────────────────────────────────────
  # Single required status check for branch protection. Downstream jobs may be
  # skipped (path filters) — that is OK; only failures or cancellations block.
  ci:
    name: CI
    if: always()
    needs: [changes, test, clippy, fmt, wasm, msrv, audit, swift, markdownlint]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependency failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: All checks passed
        run: echo "All CI checks passed"
