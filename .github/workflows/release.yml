name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_crates:
        description: "Publish to crates.io"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.cross"
        run: |
          cargo build --release --target ${{ matrix.target }} -p ldgr-cli
          cargo build --release --target ${{ matrix.target }} -p ldgr-server

      - name: Build (cross)
        if: matrix.cross
        run: |
          cross build --release --target ${{ matrix.target }} -p ldgr-cli
          cross build --release --target ${{ matrix.target }} -p ldgr-server

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ldgr-${{ matrix.target }}.tar.gz ldgr
          tar czf ../../../ldgr-server-${{ matrix.target }}.tar.gz ldgr-server
          cd ../../..
          shasum -a 256 ldgr-${{ matrix.target }}.tar.gz > ldgr-${{ matrix.target }}.tar.gz.sha256
          shasum -a 256 ldgr-server-${{ matrix.target }}.tar.gz > ldgr-server-${{ matrix.target }}.tar.gz.sha256

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/ldgr.exe" -DestinationPath "ldgr-${{ matrix.target }}.zip"
          (Get-FileHash "ldgr-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower() + "  ldgr-${{ matrix.target }}.zip" | Out-File -Encoding utf8 "ldgr-${{ matrix.target }}.zip.sha256"
          Compress-Archive -Path "target/${{ matrix.target }}/release/ldgr-server.exe" -DestinationPath "ldgr-server-${{ matrix.target }}.zip"
          (Get-FileHash "ldgr-server-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower() + "  ldgr-server-${{ matrix.target }}.zip" | Out-File -Encoding utf8 "ldgr-server-${{ matrix.target }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ldgr-${{ matrix.target }}
          path: |
            ldgr-*.tar.gz
            ldgr-*.tar.gz.sha256
            ldgr-*.zip
            ldgr-*.zip.sha256
            ldgr-server-*.tar.gz
            ldgr-server-*.tar.gz.sha256
            ldgr-server-*.zip
            ldgr-server-*.zip.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.publish_crates
    environment: crates-io
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag (if triggered from tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Dry run — ldgr-core
        run: cargo publish -p ldgr-core --dry-run

      - name: Publish ldgr-core
        run: cargo publish -p ldgr-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: |
          echo "Waiting for crates.io to index ldgr-core..."
          EXPECTED_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          for i in $(seq 1 30); do
            if cargo search ldgr-core 2>/dev/null | grep -q "ldgr-core = \"$EXPECTED_VERSION\""; then
              echo "ldgr-core $EXPECTED_VERSION is indexed."
              break
            fi
            echo "Attempt $i/30 — not yet indexed, waiting 10s..."
            sleep 10
          done

      - name: Dry run — ldgr-cli
        run: cargo publish -p ldgr-cli --dry-run

      - name: Publish ldgr-cli
        run: cargo publish -p ldgr-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
