name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

        **Note:** Features that require the server to access plaintext financial data
        are incompatible with ldgr's zero-knowledge architecture and will not be accepted.
  - type: textarea
    id: problem
    attributes:
      label: Is this related to a problem?
      description: A clear description of the problem this would solve
      placeholder: "I'm frustrated when..."
  - type: textarea
    id: solution
    attributes:
      label: Describe the feature
      description: A clear description of what you'd like to happen
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternatives you've considered
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of ldgr would this affect?
      options:
        - CLI tool
        - iOS / iPad app
        - Apple Watch app
        - Web app
        - Sync server
        - Encryption / crypto library
        - Accounting engine / parser
        - Market data
        - Budgeting / goals
        - Loan tracking
        - Import / export
        - Documentation
        - Not sure
  - type: dropdown
    id: phase
    attributes:
      label: Which roadmap phase does this relate to?
      description: See docs/roadmap.md for phase details
      options:
        - "Phase 0: Foundation"
        - "Phase 1: CLI Ledger (MVP)"
        - "Phase 2: Import, Investments & Net Worth"
        - "Phase 3: Market Tracker & Budgeting"
        - "Phase 4: Sync & iPhone/iPad"
        - "Phase 5: Web & Advanced Features"
        - "Phase 6: Polish & Ecosystem"
        - "Not sure"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information, mockups, or screenshots
