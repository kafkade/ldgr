<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 800" width="980" height="800" role="img" aria-labelledby="t d">
  <title id="t">Recovering a vault</title>
  <desc id="d">The steps from a recovery key plus a new password to a re-keyed vault: parse the header, unwrap the vault key with the recovery key, generate a new salt, derive a new master key and master encryption key, re-wrap the vault key, and re-seal the metadata. The vault key itself, the recovery wrap, and every item key and item ciphertext stay unchanged, so no item data is re-encrypted.</desc>
  <rect x="0" y="0" width="980" height="800" fill="#ffffff"/>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#374151"/>
    </marker>
    <marker id="ahd" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <style>
    text { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
    .h { font-size:21px; font-weight:700; fill:#111827; }
    .hsub { font-size:13px; fill:#4b5563; }
    .label { font-size:14px; font-weight:600; fill:#111827; }
    .sub { font-size:11.5px; fill:#4b5563; }
    .tag { font-size:10px; fill:#6b7280; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
    .step { font-size:11px; fill:#6b7280; letter-spacing:0.05em; font-weight:600; }
    .key { fill:#fef3c7; stroke:#b45309; stroke-width:2; }
    .enc { fill:#fee2e2; stroke:#b91c1c; stroke-width:2; }
    .plain { fill:#dcfce7; stroke:#15803d; stroke-width:2; }
    .op { fill:#eef2f7; stroke:#374151; stroke-width:2; }
    .actor { fill:#dbeafe; stroke:#1d4ed8; stroke-width:2; }
    .panel { fill:#f9fafb; stroke:#9ca3af; stroke-width:1.5; }
    .eph { stroke-dasharray:7 4; }
    .arrow { stroke:#374151; stroke-width:2; fill:none; }
    .dim { stroke:#9ca3af; stroke-width:1.5; fill:none; stroke-dasharray:5 3; }
    .divider { stroke:#d1d5db; stroke-width:1.5; }
  </style>

  <text x="28" y="34" text-anchor="start" class="h">Recovery — recovery key + new password → re-keyed vault</text>
  <text x="28" y="54" text-anchor="start" class="hsub">The vault key never changes, so item data is not re-encrypted — only the password path is rebuilt</text>
  <rect x="95" y="84" width="470" height="58" rx="10" class="panel" />
  <circle cx="95" cy="113.0" r="11" fill="#111827"/>
  <text x="95" y="117.0" text-anchor="middle" font-size="12px" font-weight="700" fill="#ffffff">1</text>
  <text x="121" y="110.0" text-anchor="start" class="label">Parse header</text>
  <text x="121" y="128.0" text-anchor="start" class="sub">read salt/params, wrapped_vk, recovery_wrapped_vk, item envelopes</text>
  <line x1="565" y1="113.0" x2="610" y2="113.0" class="dim" marker-end="url(#ahd)"/>
  <rect x="610" y="91.0" width="340" height="44" rx="10" class="enc" />
  <text x="780.0" y="109.0" text-anchor="middle" class="label">recovery_wrapped_vk</text>
  <text x="780.0" y="127.0" text-anchor="middle" class="sub">encrypted · from file</text>
  <line x1="330.0" y1="142" x2="330.0" y2="162" class="arrow" marker-end="url(#ah)"/>
  <rect x="95" y="162" width="470" height="58" rx="10" class="panel" />
  <circle cx="95" cy="191.0" r="11" fill="#111827"/>
  <text x="95" y="195.0" text-anchor="middle" font-size="12px" font-weight="700" fill="#ffffff">2</text>
  <text x="121" y="188.0" text-anchor="start" class="label">Unwrap VK with recovery key</text>
  <text x="121" y="206.0" text-anchor="start" class="sub">AES-GCM unwrap recovery_wrapped_vk with RK → VK (same VK as before)</text>
  <line x1="565" y1="191.0" x2="610" y2="191.0" class="dim" marker-end="url(#ahd)"/>
  <rect x="610" y="169.0" width="340" height="44" rx="10" class="key eph" />
  <text x="780.0" y="187.0" text-anchor="middle" class="label">VK</text>
  <text x="780.0" y="205.0" text-anchor="middle" class="sub">recovered in memory</text>
  <line x1="330.0" y1="220" x2="330.0" y2="240" class="arrow" marker-end="url(#ah)"/>
  <rect x="95" y="240" width="470" height="58" rx="10" class="panel" />
  <circle cx="95" cy="269.0" r="11" fill="#111827"/>
  <text x="95" y="273.0" text-anchor="middle" font-size="12px" font-weight="700" fill="#ffffff">3</text>
  <text x="121" y="266.0" text-anchor="start" class="label">Generate NEW salt + params</text>
  <text x="121" y="284.0" text-anchor="start" class="sub">fresh 32-byte salt; Argon2id parameters</text>
  <line x1="565" y1="269.0" x2="610" y2="269.0" class="dim" marker-end="url(#ahd)"/>
  <rect x="610" y="247.0" width="340" height="44" rx="10" class="plain" />
  <text x="780.0" y="265.0" text-anchor="middle" class="label">new salt</text>
  <text x="780.0" y="283.0" text-anchor="middle" class="sub">plaintext · replaces old</text>
  <line x1="330.0" y1="298" x2="330.0" y2="318" class="arrow" marker-end="url(#ah)"/>
  <rect x="95" y="318" width="470" height="58" rx="10" class="panel" />
  <circle cx="95" cy="347.0" r="11" fill="#111827"/>
  <text x="95" y="351.0" text-anchor="middle" font-size="12px" font-weight="700" fill="#ffffff">4</text>
  <text x="121" y="344.0" text-anchor="start" class="label">Derive NEW MK / MEK</text>
  <text x="121" y="362.0" text-anchor="start" class="sub">Argon2id(new_password, new_salt) → MK′; HKDF → MEK′</text>
  <line x1="565" y1="347.0" x2="610" y2="347.0" class="dim" marker-end="url(#ahd)"/>
  <rect x="610" y="325.0" width="340" height="44" rx="10" class="key eph" />
  <text x="780.0" y="343.0" text-anchor="middle" class="label">MK′, MEK′</text>
  <text x="780.0" y="361.0" text-anchor="middle" class="sub">in memory only</text>
  <line x1="330.0" y1="376" x2="330.0" y2="396" class="arrow" marker-end="url(#ah)"/>
  <rect x="95" y="396" width="470" height="58" rx="10" class="panel" />
  <circle cx="95" cy="425.0" r="11" fill="#111827"/>
  <text x="95" y="429.0" text-anchor="middle" font-size="12px" font-weight="700" fill="#ffffff">5</text>
  <text x="121" y="422.0" text-anchor="start" class="label">Re-wrap VK with new MEK</text>
  <text x="121" y="440.0" text-anchor="start" class="sub">AES-GCM · AAD ldgr-vault-wrap-v1</text>
  <line x1="565" y1="425.0" x2="610" y2="425.0" class="dim" marker-end="url(#ahd)"/>
  <rect x="610" y="403.0" width="340" height="44" rx="10" class="enc" />
  <text x="780.0" y="421.0" text-anchor="middle" class="label">new wrapped_vk</text>
  <text x="780.0" y="439.0" text-anchor="middle" class="sub">encrypted · replaces old</text>
  <line x1="330.0" y1="454" x2="330.0" y2="474" class="arrow" marker-end="url(#ah)"/>
  <rect x="95" y="474" width="470" height="58" rx="10" class="panel" />
  <circle cx="95" cy="503.0" r="11" fill="#111827"/>
  <text x="95" y="507.0" text-anchor="middle" font-size="12px" font-weight="700" fill="#ffffff">6</text>
  <text x="121" y="500.0" text-anchor="start" class="label">Re-seal metadata</text>
  <text x="121" y="518.0" text-anchor="start" class="sub">re-encrypt {name, created_at} under VK (fresh nonce)</text>
  <line x1="565" y1="503.0" x2="610" y2="503.0" class="dim" marker-end="url(#ahd)"/>
  <rect x="610" y="481.0" width="340" height="44" rx="10" class="enc" />
  <text x="780.0" y="499.0" text-anchor="middle" class="label">encrypted_metadata′</text>
  <text x="780.0" y="517.0" text-anchor="middle" class="sub">encrypted · fresh nonce</text>
  <line x1="330.0" y1="532" x2="330.0" y2="552" class="arrow" marker-end="url(#ah)"/>
  <rect x="95" y="552" width="470" height="58" rx="10" class="panel" />
  <circle cx="95" cy="581.0" r="11" fill="#111827"/>
  <text x="95" y="585.0" text-anchor="middle" font-size="12px" font-weight="700" fill="#ffffff">7</text>
  <text x="121" y="578.0" text-anchor="start" class="label">Write updated header</text>
  <text x="121" y="596.0" text-anchor="start" class="sub">recovery_wrapped_vk and ALL item envelopes stay untouched</text>
  <line x1="565" y1="581.0" x2="610" y2="581.0" class="dim" marker-end="url(#ahd)"/>
  <rect x="610" y="559.0" width="340" height="44" rx="10" class="enc eph" />
  <text x="780.0" y="577.0" text-anchor="middle" class="label">items unchanged</text>
  <text x="780.0" y="595.0" text-anchor="middle" class="sub">not re-encrypted</text>
  <line x1="28" y1="742" x2="952" y2="742" class="divider"/>
  <rect x="28" y="758" width="16" height="12" rx="3" class="plain"/>
  <text x="50" y="769" text-anchor="start" class="sub">plaintext (at rest)</text>
  <rect x="193.39999999999998" y="758" width="16" height="12" rx="3" class="enc"/>
  <text x="215.39999999999998" y="769" text-anchor="start" class="sub">encrypted (at rest)</text>
  <rect x="358.79999999999995" y="758" width="16" height="12" rx="3" class="key eph"/>
  <text x="380.79999999999995" y="769" text-anchor="start" class="sub">key in memory</text>
  <rect x="484.59999999999997" y="758" width="16" height="12" rx="3" class="op"/>
  <text x="506.59999999999997" y="769" text-anchor="start" class="sub">operation</text>
</svg>
