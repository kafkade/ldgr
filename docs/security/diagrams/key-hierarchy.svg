<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 900" width="980" height="900" role="img" aria-labelledby="t d">
  <title id="t">ldgr vault key hierarchy</title>
  <desc id="d">How the password and a salt derive the master key, which splits into an auth key and a master encryption key; the master encryption key and an independent recovery key each wrap the same vault key, which in turn wraps a per-item key that seals each encrypted item. Dashed boxes are keys that live only in memory; red boxes are encrypted data stored in the vault file; green is plaintext stored in the header.</desc>
  <rect x="0" y="0" width="980" height="900" fill="#ffffff"/>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#374151"/>
    </marker>
    <marker id="ahd" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <style>
    text { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
    .h { font-size:21px; font-weight:700; fill:#111827; }
    .hsub { font-size:13px; fill:#4b5563; }
    .label { font-size:14px; font-weight:600; fill:#111827; }
    .sub { font-size:11.5px; fill:#4b5563; }
    .tag { font-size:10px; fill:#6b7280; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
    .step { font-size:11px; fill:#6b7280; letter-spacing:0.05em; font-weight:600; }
    .key { fill:#fef3c7; stroke:#b45309; stroke-width:2; }
    .enc { fill:#fee2e2; stroke:#b91c1c; stroke-width:2; }
    .plain { fill:#dcfce7; stroke:#15803d; stroke-width:2; }
    .op { fill:#eef2f7; stroke:#374151; stroke-width:2; }
    .actor { fill:#dbeafe; stroke:#1d4ed8; stroke-width:2; }
    .panel { fill:#f9fafb; stroke:#9ca3af; stroke-width:1.5; }
    .eph { stroke-dasharray:7 4; }
    .arrow { stroke:#374151; stroke-width:2; fill:none; }
    .dim { stroke:#9ca3af; stroke-width:1.5; fill:none; stroke-dasharray:5 3; }
    .divider { stroke:#d1d5db; stroke-width:1.5; }
  </style>

  <text x="28" y="34" text-anchor="start" class="h">Vault key hierarchy</text>
  <text x="28" y="54" text-anchor="start" class="hsub">Password → MK → {AuthKey, MEK} → VK → per-item keys · recovery key is an alternate path to the same VK</text>
  <rect x="165" y="84" width="170" height="56" rx="10" class="actor eph" />
  <text x="250.0" y="108.0" text-anchor="middle" class="label">Password</text>
  <text x="250.0" y="126.0" text-anchor="middle" class="sub">user secret</text>
  <rect x="645" y="84" width="170" height="56" rx="10" class="plain" />
  <text x="730.0" y="108.0" text-anchor="middle" class="label">Salt (32 B)</text>
  <text x="730.0" y="126.0" text-anchor="middle" class="sub">in file header · plaintext</text>
  <rect x="390" y="176" width="200" height="46" rx="10" class="op" />
  <text x="490.0" y="195.0" text-anchor="middle" class="label">Argon2id</text>
  <text x="490.0" y="213.0" text-anchor="middle" class="sub">password + salt → 32 B</text>
  <polyline points="250,140 250,158 440,158 440,176" class="arrow" marker-end="url(#ah)"/>
  <polyline points="730,140 730,158 540,158 540,176" class="arrow" marker-end="url(#ah)"/>
  <rect x="385" y="250" width="210" height="58" rx="10" class="key eph" />
  <text x="490.0" y="275.0" text-anchor="middle" class="label">MK — Master Key (32 B)</text>
  <text x="490.0" y="293.0" text-anchor="middle" class="sub">never stored · in memory</text>
  <line x1="490" y1="222" x2="490" y2="250" class="arrow" marker-end="url(#ah)"/>
  <rect x="20" y="250" width="185" height="58" rx="10" class="key eph" />
  <text x="112.5" y="275.0" text-anchor="middle" class="label">Recovery Key (RK)</text>
  <text x="112.5" y="293.0" text-anchor="middle" class="sub">generated at setup · shown once</text>
  <rect x="185" y="344" width="190" height="46" rx="10" class="op" />
  <text x="280.0" y="363.0" text-anchor="middle" class="label">HKDF-SHA256</text>
  <text x="280.0" y="381.0" text-anchor="middle" class="sub">info = ldgr-auth-v1</text>
  <rect x="605" y="344" width="190" height="46" rx="10" class="op" />
  <text x="700.0" y="363.0" text-anchor="middle" class="label">HKDF-SHA256</text>
  <text x="700.0" y="381.0" text-anchor="middle" class="sub">info = ldgr-enc-v1</text>
  <polyline points="490,308 490,326 280,326 280,344" class="arrow" marker-end="url(#ah)"/>
  <polyline points="490,308 490,326 700,326 700,344" class="arrow" marker-end="url(#ah)"/>
  <rect x="180" y="418" width="200" height="58" rx="10" class="key eph" />
  <text x="280.0" y="443.0" text-anchor="middle" class="label">AuthKey (32 B)</text>
  <text x="280.0" y="461.0" text-anchor="middle" class="sub">server auth · NOT in vault file</text>
  <rect x="600" y="418" width="200" height="58" rx="10" class="key eph" />
  <text x="700.0" y="443.0" text-anchor="middle" class="label">MEK — Master Enc Key</text>
  <text x="700.0" y="461.0" text-anchor="middle" class="sub">in memory only</text>
  <line x1="280" y1="390" x2="280" y2="418" class="arrow" marker-end="url(#ah)"/>
  <line x1="700" y1="390" x2="700" y2="418" class="arrow" marker-end="url(#ah)"/>
  <rect x="120" y="520" width="220" height="52" rx="10" class="enc" />
  <text x="230.0" y="542.0" text-anchor="middle" class="label">recovery_wrapped_vk</text>
  <text x="230.0" y="560.0" text-anchor="middle" class="sub">in file · AAD ldgr-recovery-wrap-v1</text>
  <rect x="600" y="520" width="200" height="52" rx="10" class="enc" />
  <text x="700.0" y="542.0" text-anchor="middle" class="label">wrapped_vk</text>
  <text x="700.0" y="560.0" text-anchor="middle" class="sub">in file · AAD ldgr-vault-wrap-v1</text>
  <polyline points="112,308 112,546 120,546" class="arrow" marker-end="url(#ah)"/>
  <text x="150" y="500" text-anchor="start" class="step">wrap</text>
  <line x1="700" y1="476" x2="700" y2="520" class="arrow" marker-end="url(#ah)"/>
  <text x="712" y="500" text-anchor="start" class="step">wrap</text>
  <rect x="375" y="626" width="230" height="64" rx="10" class="key eph" stroke-width="3"/>
  <text x="490.0" y="654.0" text-anchor="middle" class="label">VK — Vault Key (32 B)</text>
  <text x="490.0" y="672.0" text-anchor="middle" class="sub">the pivot · unwraps to same 32 B either way</text>
  <polyline points="230,572 230,600 430,600 430,626" class="arrow" marker-end="url(#ah)"/>
  <polyline points="700,572 700,600 555,600 555,626" class="arrow" marker-end="url(#ah)"/>
  <text x="360" y="614" text-anchor="middle" class="step">unwrap</text>
  <text x="628" y="614" text-anchor="middle" class="step">unwrap</text>
  <rect x="150" y="760" width="175" height="58" rx="10" class="key eph" />
  <text x="237.5" y="785.0" text-anchor="middle" class="label">IK — Item Key</text>
  <text x="237.5" y="803.0" text-anchor="middle" class="sub">one per item · in memory</text>
  <rect x="600" y="760" width="240" height="58" rx="10" class="enc" />
  <text x="720.0" y="785.0" text-anchor="middle" class="label">Encrypted item payload</text>
  <text x="720.0" y="803.0" text-anchor="middle" class="sub">sealed envelope · in file</text>
  <polyline points="490,690 490,720 237,720 237,760" class="arrow" marker-end="url(#ah)"/>
  <text x="360" y="712" text-anchor="middle" class="tag">wrap · AAD ldgr-item-wrap-v1</text>
  <line x1="325" y1="789" x2="600" y2="789" class="arrow" marker-end="url(#ah)"/>
  <text x="462" y="780" text-anchor="middle" class="tag">seal · AAD ldgr-item-seal-v1</text>
  <text x="237" y="835" text-anchor="middle" class="tag">wrapped_ik travels inside the item envelope</text>
  <line x1="28" y1="862" x2="952" y2="862" class="divider"/>
  <rect x="28" y="876" width="16" height="12" rx="3" class="plain"/>
  <text x="50" y="887" text-anchor="start" class="sub">plaintext (at rest)</text>
  <rect x="193.39999999999998" y="876" width="16" height="12" rx="3" class="enc"/>
  <text x="215.39999999999998" y="887" text-anchor="start" class="sub">encrypted (at rest)</text>
  <rect x="358.79999999999995" y="876" width="16" height="12" rx="3" class="key eph"/>
  <text x="380.79999999999995" y="887" text-anchor="start" class="sub">key in memory</text>
  <rect x="484.59999999999997" y="876" width="16" height="12" rx="3" class="op"/>
  <text x="506.59999999999997" y="887" text-anchor="start" class="sub">operation</text>
  <text x="952" y="885" text-anchor="end" class="sub">dashed = key exists only in memory</text>
</svg>
