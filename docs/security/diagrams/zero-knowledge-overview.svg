<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" width="1000" height="660" role="img" aria-labelledby="t d">
  <title id="t">Zero-knowledge trust boundary</title>
  <desc id="d">A split view of what each side sees. On your device the app holds your password, the keys in memory, and your plaintext transactions and accounts, and it encrypts every item before anything leaves. The server and sync transport only ever receive encrypted blobs with bucketed sizes and counts — never your password, never any key, never any plaintext.</desc>
  <rect x="0" y="0" width="1000" height="660" fill="#ffffff"/>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#374151"/>
    </marker>
    <marker id="ahd" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <style>
    text { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
    .h { font-size:21px; font-weight:700; fill:#111827; }
    .hsub { font-size:13px; fill:#4b5563; }
    .label { font-size:14px; font-weight:600; fill:#111827; }
    .sub { font-size:11.5px; fill:#4b5563; }
    .tag { font-size:10px; fill:#6b7280; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
    .step { font-size:11px; fill:#6b7280; letter-spacing:0.05em; font-weight:600; }
    .key { fill:#fef3c7; stroke:#b45309; stroke-width:2; }
    .enc { fill:#fee2e2; stroke:#b91c1c; stroke-width:2; }
    .plain { fill:#dcfce7; stroke:#15803d; stroke-width:2; }
    .op { fill:#eef2f7; stroke:#374151; stroke-width:2; }
    .actor { fill:#dbeafe; stroke:#1d4ed8; stroke-width:2; }
    .panel { fill:#f9fafb; stroke:#9ca3af; stroke-width:1.5; }
    .eph { stroke-dasharray:7 4; }
    .arrow { stroke:#374151; stroke-width:2; fill:none; }
    .dim { stroke:#9ca3af; stroke-width:1.5; fill:none; stroke-dasharray:5 3; }
    .divider { stroke:#d1d5db; stroke-width:1.5; }
  </style>

  <text x="28" y="34" text-anchor="start" class="h">Zero-knowledge: what each side can see</text>
  <text x="28" y="54" text-anchor="start" class="hsub">Only encrypted bytes cross the trust boundary — the server can never derive your keys or data</text>
  <rect x="40" y="84" width="430" height="470" rx="14" class="panel" fill="#f0fdf4"/>
  <rect x="530" y="84" width="430" height="470" rx="14" class="panel" fill="#fef2f2"/>
  <text x="255.0" y="114" text-anchor="middle" class="label">On your device (client)</text>
  <text x="255.0" y="134" text-anchor="middle" class="sub">holds keys · sees everything in the clear</text>
  <text x="745.0" y="114" text-anchor="middle" class="label">Server / sync transport</text>
  <text x="745.0" y="134" text-anchor="middle" class="sub">stores blobs · sees only ciphertext</text>
  <rect x="70" y="158" width="370" height="50" rx="10" class="actor eph" />
  <text x="255.0" y="179.0" text-anchor="middle" class="label">Your password</text>
  <text x="255.0" y="197.0" text-anchor="middle" class="sub">typed by you · never leaves</text>
  <rect x="70" y="222" width="370" height="60" rx="10" class="key eph" />
  <text x="255.0" y="248.0" text-anchor="middle" class="label">Keys in memory</text>
  <text x="255.0" y="266.0" text-anchor="middle" class="sub">MK · MEK · VK · recovery key · item keys</text>
  <rect x="70" y="296" width="370" height="60" rx="10" class="plain" />
  <text x="255.0" y="322.0" text-anchor="middle" class="label">Plaintext data</text>
  <text x="255.0" y="340.0" text-anchor="middle" class="sub">transactions, accounts, balances, notes</text>
  <rect x="70" y="370" width="370" height="54" rx="10" class="op" />
  <text x="255.0" y="393.0" text-anchor="middle" class="label">Encrypt before send</text>
  <text x="255.0" y="411.0" text-anchor="middle" class="sub">AES-256-GCM per item · size-bucket padding</text>
  <line x1="255.0" y1="282" x2="255.0" y2="296" class="arrow" marker-end="url(#ah)"/>
  <line x1="255.0" y1="356" x2="255.0" y2="370" class="arrow" marker-end="url(#ah)"/>
  <text x="255.0" y="456" text-anchor="middle" class="sub">✓ sees: everything, in the clear</text>
  <text x="255.0" y="480" text-anchor="middle" class="sub">because the keys live here — and only here</text>
  <rect x="560" y="158" width="370" height="60" rx="10" class="enc" />
  <text x="745.0" y="184.0" text-anchor="middle" class="label">Encrypted vault blobs</text>
  <text x="745.0" y="202.0" text-anchor="middle" class="sub">wrapped keys + sealed envelopes · opaque</text>
  <rect x="560" y="232" width="370" height="60" rx="10" class="enc" />
  <text x="745.0" y="258.0" text-anchor="middle" class="label">Encrypted sync events</text>
  <text x="745.0" y="276.0" text-anchor="middle" class="sub">one blob per changed item · batch-encrypted</text>
  <rect x="560" y="310" width="370" height="44" rx="10" class="plain" />
  <text x="745.0" y="328.0" text-anchor="middle" class="label">Coarse metadata</text>
  <text x="745.0" y="346.0" text-anchor="middle" class="sub">padded sizes (512 B / 2 / 8 / 32 KB) · item counts</text>
  <rect x="560" y="370" width="370" height="86" rx="10" class="enc" opacity="0.4"/>
  <text x="745.0" y="392" text-anchor="middle" class="label">✗ never sees</text>
  <text x="745.0" y="414" text-anchor="middle" class="sub">your password · any key · any plaintext</text>
  <text x="745.0" y="434" text-anchor="middle" class="sub">cannot decrypt — no key material ever crosses</text>
  <line x1="480" y1="90" x2="480" y2="548" stroke="#6b7280" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="480" y="82" text-anchor="middle" class="step">trust boundary</text>
  <rect x="444.0" y="252" width="72" height="46" rx="10" class="enc" />
  <path d="M466,272 v-6 a14,14 0 0 1 28,0 v6" fill="none" stroke="#b91c1c" stroke-width="2.5"/>
  <rect x="464" y="270" width="32" height="20" rx="3" fill="#fecaca" stroke="#b91c1c" stroke-width="2"/>
  <line x1="470" y1="275" x2="444.0" y2="275" class="arrow" marker-end="url(#ah)"/>
  <line x1="516.0" y1="275" x2="530" y2="275" class="arrow" marker-end="url(#ah)"/>
  <text x="480" y="242" text-anchor="middle" class="sub">only encrypted</text>
  <text x="480" y="314" text-anchor="middle" class="sub">bytes cross</text>
  <line x1="28" y1="588" x2="972" y2="588" class="divider"/>
  <rect x="28" y="604" width="16" height="12" rx="3" class="plain"/>
  <text x="50" y="615" text-anchor="start" class="sub">plaintext (at rest)</text>
  <rect x="193.39999999999998" y="604" width="16" height="12" rx="3" class="enc"/>
  <text x="215.39999999999998" y="615" text-anchor="start" class="sub">encrypted (at rest)</text>
  <rect x="358.79999999999995" y="604" width="16" height="12" rx="3" class="key eph"/>
  <text x="380.79999999999995" y="615" text-anchor="start" class="sub">key in memory</text>
  <rect x="484.59999999999997" y="604" width="16" height="12" rx="3" class="op"/>
  <text x="506.59999999999997" y="615" text-anchor="start" class="sub">operation</text>
</svg>
