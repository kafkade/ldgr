<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" width="1000" height="720" role="img" aria-labelledby="t d">
  <title id="t">Changing the vault password</title>
  <desc id="d">Changing the password rebuilds only the password path: it derives the vault key from the old password, generates a new salt, master key and master encryption key, re-wraps the vault key, and re-seals the metadata. The vault key, the recovery wrap, every item key, and all item ciphertext stay exactly the same. A split panel lists what changes versus what stays the same.</desc>
  <rect x="0" y="0" width="1000" height="720" fill="#ffffff"/>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#374151"/>
    </marker>
    <marker id="ahd" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <style>
    text { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
    .h { font-size:21px; font-weight:700; fill:#111827; }
    .hsub { font-size:13px; fill:#4b5563; }
    .label { font-size:14px; font-weight:600; fill:#111827; }
    .sub { font-size:11.5px; fill:#4b5563; }
    .tag { font-size:10px; fill:#6b7280; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
    .step { font-size:11px; fill:#6b7280; letter-spacing:0.05em; font-weight:600; }
    .key { fill:#fef3c7; stroke:#b45309; stroke-width:2; }
    .enc { fill:#fee2e2; stroke:#b91c1c; stroke-width:2; }
    .plain { fill:#dcfce7; stroke:#15803d; stroke-width:2; }
    .op { fill:#eef2f7; stroke:#374151; stroke-width:2; }
    .actor { fill:#dbeafe; stroke:#1d4ed8; stroke-width:2; }
    .panel { fill:#f9fafb; stroke:#9ca3af; stroke-width:1.5; }
    .eph { stroke-dasharray:7 4; }
    .arrow { stroke:#374151; stroke-width:2; fill:none; }
    .dim { stroke:#9ca3af; stroke-width:1.5; fill:none; stroke-dasharray:5 3; }
    .divider { stroke:#d1d5db; stroke-width:1.5; }
  </style>

  <text x="28" y="34" text-anchor="start" class="h">Change password — what changes vs what stays</text>
  <text x="28" y="54" text-anchor="start" class="hsub">Only the password-derived path is rebuilt; the vault key and all item data are untouched</text>
  <rect x="40.0" y="90" width="210" height="74" rx="10" class="op" />
  <circle cx="56.0" cy="106" r="11" fill="#111827"/>
  <text x="56.0" y="110" text-anchor="middle" font-size="12px" font-weight="700" fill="#ffffff">1</text>
  <text x="145.0" y="124" text-anchor="middle" class="label">Unwrap VK</text>
  <text x="145.0" y="142" text-anchor="middle" class="sub">with old MEK</text>
  <text x="145.0" y="157" text-anchor="middle" class="sub">(from old password)</text>
  <line x1="250.0" y1="127.0" x2="276.6666666666667" y2="127.0" class="arrow" marker-end="url(#ah)"/>
  <rect x="276.66666666666663" y="90" width="210" height="74" rx="10" class="op" />
  <circle cx="292.66666666666663" cy="106" r="11" fill="#111827"/>
  <text x="292.66666666666663" y="110" text-anchor="middle" font-size="12px" font-weight="700" fill="#ffffff">2</text>
  <text x="381.66666666666663" y="124" text-anchor="middle" class="label">New salt → MK′ → MEK′</text>
  <text x="381.66666666666663" y="142" text-anchor="middle" class="sub">Argon2id(new password,</text>
  <text x="381.66666666666663" y="157" text-anchor="middle" class="sub">new salt)</text>
  <line x1="486.66666666666663" y1="127.0" x2="513.3333333333333" y2="127.0" class="arrow" marker-end="url(#ah)"/>
  <rect x="513.3333333333333" y="90" width="210" height="74" rx="10" class="op" />
  <circle cx="529.3333333333333" cy="106" r="11" fill="#111827"/>
  <text x="529.3333333333333" y="110" text-anchor="middle" font-size="12px" font-weight="700" fill="#ffffff">3</text>
  <text x="618.3333333333333" y="124" text-anchor="middle" class="label">Re-wrap VK</text>
  <text x="618.3333333333333" y="142" text-anchor="middle" class="sub">AES-GCM →</text>
  <text x="618.3333333333333" y="157" text-anchor="middle" class="sub">new wrapped_vk</text>
  <line x1="723.3333333333333" y1="127.0" x2="749.9999999999999" y2="127.0" class="arrow" marker-end="url(#ah)"/>
  <rect x="750.0" y="90" width="210" height="74" rx="10" class="op" />
  <circle cx="766.0" cy="106" r="11" fill="#111827"/>
  <text x="766.0" y="110" text-anchor="middle" font-size="12px" font-weight="700" fill="#ffffff">4</text>
  <text x="855.0" y="124" text-anchor="middle" class="label">Re-seal metadata</text>
  <text x="855.0" y="142" text-anchor="middle" class="sub">fresh nonce</text>
  <text x="855.0" y="157" text-anchor="middle" class="sub">under same VK</text>
  <rect x="40" y="210" width="430" height="380" rx="12" class="panel" />
  <rect x="530" y="210" width="430" height="380" rx="12" class="panel" />
  <rect x="40" y="210" width="430" height="40" rx="12" class="enc"/>
  <rect x="530" y="210" width="430" height="40" rx="12" class="plain"/>
  <text x="255.0" y="236" text-anchor="middle" class="label">CHANGES  (new password path)</text>
  <text x="745.0" y="236" text-anchor="middle" class="label">STAYS THE SAME  (vault + items)</text>
  <rect x="56" y="268" width="398" height="52" rx="8" class="enc" opacity="0.55"/>
  <text x="70" y="290" text-anchor="start" class="label">Salt</text>
  <text x="70" y="308" text-anchor="start" class="sub">new 32-byte random salt in the header</text>
  <rect x="56" y="328" width="398" height="52" rx="8" class="enc" opacity="0.55"/>
  <text x="70" y="350" text-anchor="start" class="label">MK — Master Key</text>
  <text x="70" y="368" text-anchor="start" class="sub">recomputed by Argon2id from the new password</text>
  <rect x="56" y="388" width="398" height="52" rx="8" class="enc" opacity="0.55"/>
  <text x="70" y="410" text-anchor="start" class="label">MEK — Master Enc Key</text>
  <text x="70" y="428" text-anchor="start" class="sub">re-derived via HKDF from the new MK</text>
  <rect x="56" y="448" width="398" height="52" rx="8" class="enc" opacity="0.55"/>
  <text x="70" y="470" text-anchor="start" class="label">wrapped_vk</text>
  <text x="70" y="488" text-anchor="start" class="sub">VK re-wrapped under the new MEK</text>
  <rect x="56" y="508" width="398" height="52" rx="8" class="enc" opacity="0.55"/>
  <text x="70" y="530" text-anchor="start" class="label">encrypted_metadata</text>
  <text x="70" y="548" text-anchor="start" class="sub">re-sealed with a fresh nonce</text>
  <rect x="546" y="268" width="398" height="52" rx="8" class="plain" opacity="0.55"/>
  <text x="560" y="290" text-anchor="start" class="label">VK — Vault Key</text>
  <text x="560" y="308" text-anchor="start" class="sub">the pivot key is never regenerated</text>
  <rect x="546" y="328" width="398" height="52" rx="8" class="plain" opacity="0.55"/>
  <text x="560" y="350" text-anchor="start" class="label">recovery_wrapped_vk</text>
  <text x="560" y="368" text-anchor="start" class="sub">recovery key still unwraps the same VK</text>
  <rect x="546" y="388" width="398" height="52" rx="8" class="plain" opacity="0.55"/>
  <text x="560" y="410" text-anchor="start" class="label">All item keys (IK)</text>
  <text x="560" y="428" text-anchor="start" class="sub">no per-item key is rotated</text>
  <rect x="546" y="448" width="398" height="52" rx="8" class="plain" opacity="0.55"/>
  <text x="560" y="470" text-anchor="start" class="label">All item ciphertext</text>
  <text x="560" y="488" text-anchor="start" class="sub">not a single item is re-encrypted</text>
  <rect x="546" y="508" width="398" height="52" rx="8" class="plain" opacity="0.55"/>
  <text x="560" y="530" text-anchor="start" class="label">Recovery key (RK)</text>
  <text x="560" y="548" text-anchor="start" class="sub">the user&#x27;s recovery code is unchanged</text>
  <line x1="28" y1="662" x2="972" y2="662" class="divider"/>
  <rect x="28" y="678" width="16" height="12" rx="3" class="enc"/>
  <text x="50" y="689" text-anchor="start" class="sub">changes / re-derived</text>
  <rect x="200.0" y="678" width="16" height="12" rx="3" class="plain"/>
  <text x="222.0" y="689" text-anchor="start" class="sub">unchanged</text>
  <rect x="299.4" y="678" width="16" height="12" rx="3" class="op"/>
  <text x="321.4" y="689" text-anchor="start" class="sub">step</text>
</svg>
