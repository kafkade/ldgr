<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" width="880" height="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">How ldgr protects your data</title>
  <desc id="desc">You unlock your vault with your password. Everything you save is locked inside the vault before it ever leaves your device. When data syncs to the cloud, the cloud only ever sees sealed, unreadable boxes.</desc>

  <style>
    .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 12; }
    .label { fill: #111827; font-size: 16px; font-weight: 600; }
    .sub { fill: #4b5563; font-size: 12px; }
    .step { fill: #6b7280; font-size: 11px; letter-spacing: 0.08em; }
    .arrow { stroke: #1f2937; stroke-width: 2.5; fill: none; }
    .lock { fill: #f59e0b; }
    .cloudbox { fill: #f3f4f6; stroke: #1f2937; stroke-width: 2; }
  </style>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1f2937"/>
    </marker>
  </defs>

  <!-- 1. You -->
  <g transform="translate(20,110)">
    <rect class="box" width="150" height="100" rx="12"/>
    <circle cx="75" cy="38" r="18" fill="#dbeafe" stroke="#1f2937" stroke-width="2"/>
    <text x="75" y="75" text-anchor="middle" class="label">You</text>
    <text x="75" y="92" text-anchor="middle" class="sub">your password</text>
  </g>

  <!-- Arrow 1 -->
  <line class="arrow" x1="172" y1="160" x2="232" y2="160" marker-end="url(#arrowhead)"/>
  <text x="202" y="148" text-anchor="middle" class="step">UNLOCKS</text>

  <!-- 2. Vault (locked box) -->
  <g transform="translate(234,90)">
    <rect class="box" width="180" height="140" rx="12"/>
    <!-- safe body -->
    <rect x="46" y="34" width="88" height="74" rx="8" fill="#fef3c7" stroke="#1f2937" stroke-width="2"/>
    <!-- lock dial -->
    <circle cx="90" cy="71" r="14" class="lock" stroke="#1f2937" stroke-width="2"/>
    <rect x="88" y="63" width="4" height="16" fill="#1f2937"/>
    <text x="90" y="128" text-anchor="middle" class="label">Your Vault</text>
  </g>

  <!-- Arrow 2 -->
  <line class="arrow" x1="416" y1="160" x2="476" y2="160" marker-end="url(#arrowhead)"/>
  <text x="446" y="148" text-anchor="middle" class="step">LOCKS</text>

  <!-- 3. Encrypted data -->
  <g transform="translate(478,90)">
    <rect class="box" width="170" height="140" rx="12"/>
    <g transform="translate(40,30)">
      <rect width="40" height="34" rx="5" fill="#e5e7eb" stroke="#1f2937" stroke-width="2"/>
      <path d="M28,26 v-6 a12,12 0 0 1 24,0 v6" fill="none" stroke="#1f2937" stroke-width="2.5" transform="translate(-8,0)"/>
      <rect x="50" y="0" width="40" height="34" rx="5" fill="#e5e7eb" stroke="#1f2937" stroke-width="2"/>
      <path d="M28,26 v-6 a12,12 0 0 1 24,0 v6" fill="none" stroke="#1f2937" stroke-width="2.5" transform="translate(42,0)"/>
    </g>
    <text x="85" y="108" text-anchor="middle" class="label">Locked Data</text>
    <text x="85" y="125" text-anchor="middle" class="sub">unreadable without you</text>
  </g>

  <!-- Arrow 3 -->
  <line class="arrow" x1="650" y1="160" x2="710" y2="160" marker-end="url(#arrowhead)"/>
  <text x="680" y="148" text-anchor="middle" class="step">SYNCS</text>

  <!-- 4. Cloud -->
  <g transform="translate(712,100)">
    <rect class="cloudbox" width="148" height="120" rx="12"/>
    <path d="M34,58 a20,20 0 0 1 38,-8 a16,16 0 0 1 30,6 a16,16 0 0 1 -4,32 H44 a18,18 0 0 1 -10,-30 Z"
          fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
    <text x="74" y="100" text-anchor="middle" class="label">The Cloud</text>
    <text x="74" y="116" text-anchor="middle" class="sub">sees only locked boxes</text>
  </g>
</svg>
